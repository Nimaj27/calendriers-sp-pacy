<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#CC1D1D">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Calendriers SP">
  <title>Tournée Calendriers — SP Pacy</title>
  <link rel="manifest" href="./manifest.json">
  <style>/* ============================================================
   style.css — Design mobile-first Amicale SP Pacy-sur-Eure
   Palette : rouge pompier #CC1D1D, gris ardoise #2D3142,
             blanc #FFFFFF, orange alerte #F97316, vert succès #16A34A
   ============================================================ */

/* ── Reset & variables ───────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Couleurs SDIS */
  --rouge:       #CC1D1D;
  --rouge-dark:  #A01515;
  --rouge-light: #FDECEA;
  --ardoise:     #2D3142;
  --ardoise-mid: #4A4E6A;
  --ardoise-light: #E8E9EF;
  --blanc:       #FFFFFF;
  --gris-fond:   #F4F5F9;
  --gris-bord:   #D1D5DB;
  --orange:      #F97316;
  --vert:        #16A34A;
  --vert-light:  #DCFCE7;
  --jaune:       #EAB308;
  --jaune-light: #FEF9C3;
  --bleu:        #2563EB;
  --bleu-light:  #DBEAFE;

  /* Spacing */
  --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px;
  --sp-5: 20px; --sp-6: 24px; --sp-8: 32px; --sp-10: 40px;

  /* Border radius */
  --r-sm: 6px; --r-md: 10px; --r-lg: 16px; --r-xl: 24px;

  /* Shadow */
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
  --shadow-md: 0 4px 12px rgba(0,0,0,.10);
  --shadow-lg: 0 8px 24px rgba(0,0,0,.14);

  /* Font */
  --font: 'Inter', system-ui, -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'Courier New', monospace;
}

html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font);
  background: var(--gris-fond);
  color: var(--ardoise);
  line-height: 1.5;
  min-height: 100vh;
}

/* Google Font */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

/* ── Utilitaires ─────────────────────────────────────────────── */
.hidden { display: none !important; }

/* ── Toasts ──────────────────────────────────────────────────── */
#toasts {
  position: fixed; bottom: var(--sp-5); right: var(--sp-5);
  z-index: 9999; display: flex; flex-direction: column; gap: var(--sp-2);
}
.toast {
  padding: var(--sp-3) var(--sp-5);
  border-radius: var(--r-md);
  font-size: .9rem; font-weight: 500;
  color: var(--blanc); max-width: 320px;
  animation: slideUp .25s ease;
  box-shadow: var(--shadow-md);
}
.toast--info    { background: var(--ardoise); }
.toast--success { background: var(--vert); }
.toast--error   { background: var(--rouge); }
@keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: none; opacity: 1; } }

/* ── Loader ──────────────────────────────────────────────────── */
.loader {
  padding: var(--sp-8) var(--sp-5);
  text-align: center; color: var(--ardoise-mid);
  font-size: .95rem;
}

/* ── Boutons ─────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: var(--sp-2);
  padding: var(--sp-3) var(--sp-5);
  border: none; border-radius: var(--r-md);
  font-family: var(--font); font-size: .9rem; font-weight: 600;
  cursor: pointer; transition: background .15s, transform .1s, opacity .15s;
  text-decoration: none; user-select: none; white-space: nowrap;
}
.btn:active { transform: scale(.97); }
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.btn--primary { background: var(--rouge); color: var(--blanc); }
.btn--primary:hover:not(:disabled) { background: var(--rouge-dark); }
.btn--ghost { background: transparent; color: var(--ardoise); border: 1.5px solid var(--gris-bord); }
.btn--ghost:hover:not(:disabled) { background: var(--ardoise-light); }
.btn--danger { background: var(--rouge-light); color: var(--rouge-dark); }
.btn--danger:hover:not(:disabled) { background: #f8b4b4; }
.btn--sm { padding: var(--sp-2) var(--sp-3); font-size: .82rem; }
.btn--full { width: 100%; justify-content: center; }

/* ── Inputs ──────────────────────────────────────────────────── */
.input {
  display: block; width: 100%;
  padding: var(--sp-3) var(--sp-4);
  border: 1.5px solid var(--gris-bord);
  border-radius: var(--r-md);
  font-family: var(--font); font-size: .95rem;
  color: var(--ardoise); background: var(--blanc);
  transition: border-color .15s, box-shadow .15s;
  -webkit-appearance: none;
}
.input:focus { outline: none; border-color: var(--rouge); box-shadow: 0 0 0 3px rgba(204,29,29,.12); }
.input.textarea { resize: vertical; min-height: 80px; }
.input--sm { padding: var(--sp-2) var(--sp-3); font-size: .85rem; }
.input--color { padding: var(--sp-2); height: 42px; cursor: pointer; }
.input--montant { font-size: 1.3rem; font-weight: 700; text-align: center; }
.label { display: block; font-size: .85rem; font-weight: 600; color: var(--ardoise-mid); margin: var(--sp-4) 0 var(--sp-1); }

/* ── Badges ──────────────────────────────────────────────────── */
.badge {
  display: inline-block; padding: 2px 8px;
  border-radius: 99px; font-size: .75rem; font-weight: 600;
}
.badge--libre     { background: var(--gris-bord); color: var(--ardoise-mid); }
.badge--affecte   { background: var(--bleu-light); color: var(--bleu); }
.badge--en_cours  { background: var(--jaune-light); color: #92400E; }
.badge--termine   { background: var(--vert-light); color: #14532D; }
.badge--don       { background: var(--vert-light); color: #14532D; }
.badge--refuse    { background: var(--rouge-light); color: var(--rouge-dark); }
.badge--absent    { background: var(--jaune-light); color: #92400E; }
.badge--relance   { background: #FEF3C7; color: #92400E; }

/* ── Page Login ──────────────────────────────────────────────── */
.login-wrap {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: var(--sp-5);
  background: linear-gradient(135deg, var(--ardoise) 0%, #1a1e30 100%);
}
.login-card {
  background: var(--blanc); border-radius: var(--r-xl);
  padding: var(--sp-8); width: 100%; max-width: 400px;
  box-shadow: var(--shadow-lg);
}
.login-logo {
  display: flex; align-items: center; gap: var(--sp-4);
  margin-bottom: var(--sp-6); padding-bottom: var(--sp-6);
  border-bottom: 1.5px solid var(--ardoise-light);
}
.login-logo img { width: 52px; height: 52px; object-fit: contain; }
.login-logo-icon { font-size: 2.4rem; line-height: 1; flex-shrink: 0; }

.login-logo-title { display: block; font-size: 1.05rem; font-weight: 700; color: var(--ardoise); }
.login-logo-sub   { display: block; font-size: .8rem; color: var(--ardoise-mid); margin-top: 2px; }

/* Tabs login */
.login-tabs {
  display: flex; gap: var(--sp-2); margin-bottom: var(--sp-5);
  background: var(--gris-fond); border-radius: var(--r-md); padding: 4px;
}
.tab-btn {
  flex: 1; padding: var(--sp-2) var(--sp-3);
  background: none; border: none; border-radius: var(--r-sm);
  font-family: var(--font); font-size: .88rem; font-weight: 500;
  color: var(--ardoise-mid); cursor: pointer; transition: all .15s;
}
.tab-btn--active { background: var(--blanc); color: var(--ardoise); box-shadow: var(--shadow-sm); font-weight: 600; }
.login-hint { font-size: .88rem; color: var(--ardoise-mid); margin-bottom: var(--sp-4); }

/* PIN pad */
.pin-display {
  font-family: var(--font-mono); font-size: 2rem; font-weight: 700;
  text-align: center; letter-spacing: 1rem;
  color: var(--ardoise); padding: var(--sp-4);
  background: var(--gris-fond); border-radius: var(--r-md);
  margin-bottom: var(--sp-4);
}
.pin-pad {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--sp-3);
  margin-bottom: var(--sp-3);
}
.pin-key {
  padding: var(--sp-4); border: none; border-radius: var(--r-md);
  background: var(--gris-fond); font-family: var(--font);
  font-size: 1.2rem; font-weight: 600; color: var(--ardoise);
  cursor: pointer; transition: background .1s, transform .1s;
  min-height: 54px;
}
.pin-key:active { background: var(--ardoise-light); transform: scale(.95); }
.pin-key--empty { visibility: hidden; }
.error-msg { color: var(--rouge); font-size: .85rem; text-align: center; margin-top: var(--sp-2); }

/* ── Layout Admin ────────────────────────────────────────────── */
.admin-layout {
  display: flex; min-height: 100vh;
}
.sidebar {
  width: 240px; min-width: 240px;
  background: var(--ardoise); color: var(--blanc);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; height: 100vh;
  z-index: 100;
}
.sidebar-brand {
  display: flex; align-items: center; gap: var(--sp-3);
  padding: var(--sp-5) var(--sp-5) var(--sp-4);
  border-bottom: 1px solid rgba(255,255,255,.1);
}
.sidebar-icon { font-size: 1.5rem; }
.sidebar-title { font-size: .9rem; font-weight: 700; line-height: 1.3; }
.sidebar-title small { font-weight: 400; opacity: .7; }
.sidebar-nav { flex: 1; padding: var(--sp-4) 0; overflow-y: auto; list-style: none; }
.sidebar-link {
  display: flex; align-items: center; gap: var(--sp-3);
  padding: var(--sp-3) var(--sp-5); color: rgba(255,255,255,.75);
  text-decoration: none; font-size: .9rem; font-weight: 500;
  transition: background .15s, color .15s;
}
.sidebar-link:hover { background: rgba(255,255,255,.08); color: var(--blanc); }
.sidebar-link--active { background: var(--rouge); color: var(--blanc); }
.sidebar-link-icon { font-size: 1.1rem; width: 20px; text-align: center; }
.sidebar-footer { padding: var(--sp-4) var(--sp-5); border-top: 1px solid rgba(255,255,255,.1); }
.sidebar-user { display: block; font-size: .78rem; color: rgba(255,255,255,.5); margin-bottom: var(--sp-2); word-break: break-all; }

.admin-content {
  margin-left: 240px; flex: 1;
  padding: var(--sp-6); min-height: 100vh;
}

/* ── Page header ─────────────────────────────────────────────── */
.page-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: var(--sp-6); flex-wrap: wrap; gap: var(--sp-3);
}
.page-header h1 { font-size: 1.5rem; font-weight: 700; color: var(--ardoise); }

/* ── Stat cards ──────────────────────────────────────────────── */
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: var(--sp-4); margin-bottom: var(--sp-6);
}
.stat-card {
  background: var(--blanc); border-radius: var(--r-lg);
  padding: var(--sp-5); box-shadow: var(--shadow-sm);
  border: 1.5px solid var(--gris-bord);
}
.stat-card--primary { background: var(--rouge); color: var(--blanc); border-color: var(--rouge-dark); }
.stat-card--primary .stat-label, .stat-card--primary .stat-sub { color: rgba(255,255,255,.8); }
.stat-value { font-size: 1.6rem; font-weight: 700; line-height: 1; margin-bottom: var(--sp-1); }
.stat-label { font-size: .85rem; font-weight: 600; color: var(--ardoise-mid); margin-bottom: var(--sp-2); }
.stat-sub   { font-size: .78rem; color: var(--ardoise-mid); }

/* Progress bar */
.progress-bar { height: 6px; background: var(--ardoise-light); border-radius: 99px; margin: var(--sp-2) 0; overflow: hidden; }
.progress-fill { height: 100%; background: var(--vert); border-radius: 99px; transition: width .4s ease; }

/* ── Section block ───────────────────────────────────────────── */
.section-block {
  background: var(--blanc); border-radius: var(--r-lg);
  padding: var(--sp-5); box-shadow: var(--shadow-sm);
  border: 1.5px solid var(--gris-bord); margin-bottom: var(--sp-5);
}
.section-block h2 { font-size: 1.05rem; font-weight: 700; margin-bottom: var(--sp-4); }

/* Ranking équipes */
.equipes-ranking-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: var(--sp-3);
}
.ranking-card {
  background: var(--gris-fond); border-radius: var(--r-md);
  padding: var(--sp-3) var(--sp-4); border: 1.5px solid var(--ardoise-light);
}
.ranking-card-top { display: flex; align-items: center; gap: var(--sp-2); margin-bottom: var(--sp-2); }
.ranking-pos { font-weight: 700; color: var(--rouge); font-size: .82rem; }
.ranking-nom { font-weight: 600; font-size: .9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ranking-montant { font-weight: 700; color: var(--vert); font-size: 1.1rem; margin-bottom: var(--sp-2); }
.ranking-bar-wrap { width: 100%; height: 6px; background: var(--ardoise-light); border-radius: 99px; overflow: hidden; margin-bottom: var(--sp-1); }
.ranking-bar { height: 100%; background: var(--rouge); border-radius: 99px; transition: width .4s; }
.ranking-sub { font-size: .75rem; color: var(--ardoise-mid); }

/* ── Table ───────────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; }
.table {
  width: 100%; border-collapse: collapse; font-size: .9rem;
}
.table th {
  text-align: left; padding: var(--sp-3) var(--sp-4);
  background: var(--gris-fond); font-weight: 600; font-size: .82rem;
  color: var(--ardoise-mid); border-bottom: 1.5px solid var(--gris-bord);
  white-space: nowrap;
}
.table td { padding: var(--sp-3) var(--sp-4); border-bottom: 1px solid var(--ardoise-light); vertical-align: middle; }
.table tr:last-child td { border: none; }
.table tr:hover td { background: var(--gris-fond); }
.tr--don td { border-left: 3px solid var(--vert); }
.tr--refuse td { border-left: 3px solid var(--rouge); }
.tr--absent td { border-left: 3px solid var(--jaune); }
.td-actions { display: flex; gap: var(--sp-2); white-space: nowrap; }
.pin-code { background: var(--gris-fond); padding: 2px 6px; border-radius: var(--r-sm); font-family: var(--font-mono); font-size: .9rem; }

/* ── Secteurs ────────────────────────────────────────────────── */
.commune-group { margin-bottom: var(--sp-6); }
.commune-title { font-size: .85rem; font-weight: 700; color: var(--ardoise-mid); text-transform: uppercase; letter-spacing: .06em; margin-bottom: var(--sp-3); }
.secteurs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: var(--sp-3); }
.secteur-card {
  background: var(--blanc); border-radius: var(--r-lg);
  border: 1.5px solid var(--gris-bord); box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.secteur-card--termine { border-color: var(--vert); }
.secteur-card--en_cours { border-color: var(--jaune); }
.secteur-card-header {
  display: flex; align-items: center; gap: var(--sp-3);
  padding: var(--sp-4) var(--sp-4) var(--sp-3);
  border-bottom: 1px solid var(--ardoise-light);
}
.secteur-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.secteur-card-header strong { flex: 1; font-size: .95rem; }
.secteur-card-body { padding: var(--sp-3) var(--sp-4); }
.secteur-equipe { font-size: .88rem; color: var(--ardoise-mid); margin-bottom: var(--sp-2); }
.secteur-commune-label { font-size: .72rem; font-weight: 600; color: var(--ardoise-mid); text-transform: uppercase; letter-spacing: .04em; margin-bottom: var(--sp-2); }
.secteur-montant { font-size: 1.1rem; font-weight: 700; color: var(--vert); }
.secteur-rues { font-size: .78rem; color: var(--ardoise-mid); margin-top: var(--sp-2); line-height: 1.4; }
.secteur-card-actions { display: flex; gap: var(--sp-2); padding: var(--sp-3) var(--sp-4); flex-wrap: wrap; background: var(--gris-fond); }

/* ── Modal ───────────────────────────────────────────────────── */
.modal {
  position: fixed; inset: 0; background: rgba(0,0,0,.5);
  z-index: 500; display: flex; align-items: flex-end; justify-content: center;
  padding: var(--sp-4);
}
.modal:not(.hidden) { display: flex; }
.modal-inner {
  background: var(--blanc); border-radius: var(--r-xl) var(--r-xl) 0 0;
  width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto;
  padding: var(--sp-6);
}
@media (min-width: 600px) {
  .modal { align-items: center; }
  .modal-inner { border-radius: var(--r-xl); }
}
.modal-inner h2 { font-size: 1.15rem; font-weight: 700; margin-bottom: var(--sp-4); }
.modal-actions { display: flex; gap: var(--sp-3); margin-top: var(--sp-5); flex-wrap: wrap; }

/* ── Form card ───────────────────────────────────────────────── */
.form-card {
  background: var(--blanc); border-radius: var(--r-lg);
  border: 1.5px solid var(--gris-bord); padding: var(--sp-6);
  max-width: 560px; box-shadow: var(--shadow-sm);
}

/* ── Filter bar ──────────────────────────────────────────────── */
.filter-bar { margin-bottom: var(--sp-4); display: flex; gap: var(--sp-3); flex-wrap: wrap; }

/* ── Empty state ─────────────────────────────────────────────── */
.empty-state {
  padding: var(--sp-10) var(--sp-5); text-align: center;
  color: var(--ardoise-mid); font-size: .95rem; line-height: 1.6;
}

/* ── Relances ────────────────────────────────────────────────── */
.relances-count { font-weight: 600; margin-bottom: var(--sp-4); color: var(--rouge); }

/* ══════════════════════════════════════════════════════════════
   TERRAIN (interface équipier mobile)
   ══════════════════════════════════════════════════════════════ */
.terrain-layout {
  min-height: 100vh; display: flex; flex-direction: column;
  background: var(--gris-fond);
}
.terrain-header {
  background: var(--ardoise); color: var(--blanc);
  padding: var(--sp-3) var(--sp-4);
  display: flex; align-items: center; gap: var(--sp-3);
  position: sticky; top: 0; z-index: 50;
}
.terrain-brand { font-size: .9rem; font-weight: 700; flex: 1; }
.terrain-equipe { font-size: .82rem; color: rgba(255,255,255,.7); }
.terrain-header-title { flex: 1; }
.terrain-secteur-titre { font-size: .9rem; font-weight: 700; color: var(--blanc); }
.terrain-secteur-commune { font-size: .78rem; color: rgba(255,255,255,.6); }

/* Liste secteurs terrain */
.terrain-secteurs { padding: var(--sp-4); display: flex; flex-direction: column; gap: var(--sp-3); }
.terrain-empty { padding: var(--sp-8) var(--sp-5); text-align: center; color: var(--ardoise-mid); line-height: 1.7; }
.terrain-secteur-card {
  background: var(--blanc); border-radius: var(--r-lg);
  border: 1.5px solid var(--gris-bord); padding: var(--sp-4);
  cursor: pointer; transition: box-shadow .15s, transform .1s;
  box-shadow: var(--shadow-sm);
}
.terrain-secteur-card:active { transform: scale(.98); box-shadow: var(--shadow-md); }
.terrain-secteur-header { display: flex; align-items: center; gap: var(--sp-3); margin-bottom: var(--sp-3); }
.terrain-secteur-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.terrain-secteur-nom { font-weight: 700; font-size: 1rem; color: var(--ardoise); }
.terrain-secteur-commune { font-size: .8rem; color: var(--ardoise-mid); }
.terrain-secteur-stats { display: flex; gap: var(--sp-4); font-size: .85rem; color: var(--ardoise-mid); margin-bottom: var(--sp-2); }
.terrain-secteur-rues { font-size: .78rem; color: var(--ardoise-mid); }

/* Formulaire passage terrain */
.passage-form {
  background: var(--blanc); border-radius: var(--r-lg);
  margin: var(--sp-4); padding: var(--sp-5);
  box-shadow: var(--shadow-md); border: 1.5px solid var(--gris-bord);
  display: flex; flex-direction: column; gap: var(--sp-3);
}
.passage-statuts { display: flex; gap: var(--sp-2); }
.statut-btn {
  flex: 1; padding: var(--sp-3) var(--sp-2);
  border: 2px solid var(--gris-bord); border-radius: var(--r-md);
  background: none; font-family: var(--font);
  font-size: .85rem; font-weight: 600; cursor: pointer;
  transition: all .15s; text-align: center;
}
.statut-btn--don:hover, .statut-btn--don.statut-btn--selected { background: var(--vert-light); border-color: var(--vert); color: #14532D; }
.statut-btn--refuse:hover, .statut-btn--refuse.statut-btn--selected { background: var(--rouge-light); border-color: var(--rouge); color: var(--rouge-dark); }
.statut-btn--absent:hover, .statut-btn--absent.statut-btn--selected { background: var(--jaune-light); border-color: var(--jaune); color: #78350F; }

.don-details, .absent-details { display: flex; flex-direction: column; gap: var(--sp-3); }
.mode-paiement { display: flex; gap: var(--sp-2); }
.mode-btn {
  flex: 1; padding: var(--sp-3);
  border: 2px solid var(--gris-bord); border-radius: var(--r-md);
  background: none; font-family: var(--font); font-size: .88rem; font-weight: 500;
  cursor: pointer; transition: all .15s;
}
.mode-btn--active { background: var(--bleu-light); border-color: var(--bleu); color: var(--bleu); font-weight: 700; }

  <script type="module">
// ============================================================
// firebase.js — Configuration et initialisation Firebase
// Amicale SP Pacy-sur-Eure — Tournée Calendriers
// ============================================================

const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCj7etN5gV8CckkOBiFaKn38D_onZCIE2A",
  authDomain:        "calendrier-pacy.firebaseapp.com",
  projectId:         "calendrier-pacy",
  storageBucket:     "calendrier-pacy.firebasestorage.app",
  messagingSenderId: "767402684897",
  appId:             "1:767402684897:web:134c456b1de29b2dace2a0"
};

// Import Firebase SDK v12.15.0 modulaire via CDN ESM
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getFirestore,
  collection,
  doc,
  getDoc,
  getDocs,
  addDoc,
  setDoc,
  updateDoc,
  deleteDoc,
  query,
  where,
  orderBy,
  onSnapshot,
  serverTimestamp,
  increment
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
import {
  getAuth,
  signInWithPopup,
  GoogleAuthProvider,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

// Init
const app  = initializeApp(FIREBASE_CONFIG);
const db   = getFirestore(app);
const auth = getAuth(app);
const googleProvider = new GoogleAuthProvider();

// ── Collections ──────────────────────────────────────────────
const COLLECTIONS = {
  CONFIG:   "config",
  EQUIPES:  "equipes",
  SECTEURS: "secteurs",
  PASSAGES: "passages",
  ADMINS:   "admins"
};

// ── Helpers Firestore ─────────────────────────────────────────
const fsCollection = (name)           => collection(db, name);
const fsDoc        = (path, ...id)    => doc(db, path, ...id);
const fsAdd        = (col, data)      => addDoc(collection(db, col), { ...data, createdAt: serverTimestamp() });
const fsSet        = (col, id, data)  => setDoc(doc(db, col, id), { ...data, updatedAt: serverTimestamp() }, { merge: true });
const fsUpdate     = (col, id, data)  => updateDoc(doc(db, col, id), { ...data, updatedAt: serverTimestamp() });
const fsDelete     = (col, id)        => deleteDoc(doc(db, col, id));
const fsGet        = async (col, id)  => { const s = await getDoc(doc(db, col, id)); return s.exists() ? { id: s.id, ...s.data() } : null; };
const fsGetAll     = async (col)      => { const s = await getDocs(collection(db, col)); return s.docs.map(d => ({ id: d.id, ...d.data() })); };
const fsQuery      = async (col, ...constraints) => {
  const s = await getDocs(query(collection(db, col), ...constraints));
  return s.docs.map(d => ({ id: d.id, ...d.data() }));
};
const fsListen     = (col, cb, ...constraints) => {
  const q = constraints.length ? query(collection(db, col), ...constraints) : collection(db, col);
  return onSnapshot(q, snap => cb(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
};
const fsListenDoc  = (col, id, cb) =>
  onSnapshot(doc(db, col, id), snap => cb(snap.exists() ? { id: snap.id, ...snap.data() } : null));

// ── Auth Google ───────────────────────────────────────────────
const loginGoogle      = () => signInWithPopup(auth, googleProvider);
const getLoginRedirect = () => Promise.resolve(null);
const logoutGoogle = () => signOut(auth);
const onAuth       = (cb) => onAuthStateChanged(auth, cb);

// ── Vérification rôle admin ───────────────────────────────────
async function isAdmin(email) {
  if (!email) return false;
  const snap = await getDoc(doc(db, COLLECTIONS.ADMINS, email));
  return snap.exists();
}

// ── Auth PIN équipier ─────────────────────────────────────────
async function loginPin(pin) {
  const equipes = await fsQuery(COLLECTIONS.EQUIPES, where("pin", "==", pin));
  if (equipes.length === 0) return null;
  return equipes[0];
}


// ============================================================
// secteurs.js — Gestion des secteurs géographiques
// Amicale SP Pacy-sur-Eure — Tournée Calendriers
// ============================================================


// ── Statuts possibles d'un secteur ───────────────────────────
const STATUT_SECTEUR = {
  LIBRE:      "libre",       // Non affecté
  AFFECTE:    "affecte",     // Équipe assignée, pas encore commencé
  EN_COURS:   "en_cours",    // Tournée démarrée
  TERMINE:    "termine"      // Tous les foyers visités
};

const STATUT_LABEL = {
  libre:    "Non affecté",
  affecte:  "Affecté",
  en_cours: "En cours",
  termine:  "Terminé"
};

// ── Création d'un secteur ─────────────────────────────────────
async function creerSecteur({ nom, commune, description = "", rues = [], couleur = "#EF4444" }) {
  if (!nom || !commune) throw new Error("Nom et commune obligatoires");
  return fsAdd(COLLECTIONS.SECTEURS, {
    nom,
    commune,
    description,
    rues,          // tableau de strings : noms de rues / zones
    couleur,       // couleur d'affichage sur le tableau de bord
    statut: STATUT_SECTEUR.LIBRE,
    equipeId: null,
    equipNom: null,
    totalCollecte: 0,
    nbFoyersVisites: 0,
    nbFoyersAbsents: 0,
    nbFoyersTotal: 0,
    dateDebut: null,
    dateFin: null
  });
}

// ── Mise à jour d'un secteur ──────────────────────────────────
async function mettreAJourSecteur(secteurId, data) {
  return fsUpdate(COLLECTIONS.SECTEURS, secteurId, data);
}

// ── Suppression d'un secteur ──────────────────────────────────
async function supprimerSecteur(secteurId) {
  return fsDelete(COLLECTIONS.SECTEURS, secteurId);
}

// ── Affecter une équipe à un secteur ─────────────────────────
async function affecterEquipe(secteurId, equipeId, equipeNom) {
  return fsUpdate(COLLECTIONS.SECTEURS, secteurId, {
    equipeId,
    equipNom: equipeNom,
    statut: STATUT_SECTEUR.AFFECTE
  });
}

// ── Désaffecter l'équipe d'un secteur ────────────────────────
async function desaffecterEquipe(secteurId) {
  return fsUpdate(COLLECTIONS.SECTEURS, secteurId, {
    equipeId: null,
    equipNom: null,
    statut: STATUT_SECTEUR.LIBRE
  });
}

// ── Démarrer la tournée d'un secteur ─────────────────────────
async function demarrerSecteur(secteurId) {
  return fsUpdate(COLLECTIONS.SECTEURS, secteurId, {
    statut: STATUT_SECTEUR.EN_COURS,
    dateDebut: new Date().toISOString()
  });
}

// ── Clôturer un secteur ───────────────────────────────────────
async function cloturerSecteur(secteurId) {
  return fsUpdate(COLLECTIONS.SECTEURS, secteurId, {
    statut: STATUT_SECTEUR.TERMINE,
    dateFin: new Date().toISOString()
  });
}

// ── Lecture des secteurs ──────────────────────────────────────
async function lireSecteurs() {
  return fsGetAll(COLLECTIONS.SECTEURS);
}

async function lireSecteur(secteurId) {
  return fsGet(COLLECTIONS.SECTEURS, secteurId);
}

async function secteursParEquipe(equipeId) {
  return fsQuery(COLLECTIONS.SECTEURS, where("equipeId", "==", equipeId));
}

// ── Écoute temps réel ─────────────────────────────────────────
function ecouterSecteurs(callback) {
  return fsListen(COLLECTIONS.SECTEURS, (secteurs) => {
    secteurs.sort((a, b) => (a.commune + a.nom).localeCompare(b.commune + b.nom));
    callback(secteurs);
  });
}

function ecouterSecteursEquipe(equipeId, callback) {
  return fsListen(COLLECTIONS.SECTEURS, callback, where("equipeId", "==", equipeId));
}

// ── Recalcul des totaux d'un secteur depuis ses passages ──────
async function recalculerTotauxSecteur(secteurId) {
  const passages = await fsQuery(
    COLLECTIONS.PASSAGES,
    where("secteurId", "==", secteurId)
  );
  let totalCollecte   = 0;
  let nbFoyersVisites = 0;
  let nbFoyersAbsents = 0;
  let nbFoyersTotal   = passages.length;

  for (const p of passages) {
    if (p.statut === "don")    { totalCollecte += Number(p.montant || 0); nbFoyersVisites++; }
    if (p.statut === "refuse") { nbFoyersVisites++; }
    if (p.statut === "absent") { nbFoyersAbsents++; }
  }

  await fsUpdate(COLLECTIONS.SECTEURS, secteurId, {
    totalCollecte,
    nbFoyersVisites,
    nbFoyersAbsents,
    nbFoyersTotal
  });
  return { totalCollecte, nbFoyersVisites, nbFoyersAbsents, nbFoyersTotal };
}

// ── Stats globales ────────────────────────────────────────────
async function statsGlobales() {
  const secteurs = await lireSecteurs();
  return {
    total:    secteurs.length,
    libre:    secteurs.filter(s => s.statut === STATUT_SECTEUR.LIBRE).length,
    affecte:  secteurs.filter(s => s.statut === STATUT_SECTEUR.AFFECTE).length,
    en_cours: secteurs.filter(s => s.statut === STATUT_SECTEUR.EN_COURS).length,
    termine:  secteurs.filter(s => s.statut === STATUT_SECTEUR.TERMINE).length,
    totalCollecte: secteurs.reduce((sum, s) => sum + (s.totalCollecte || 0), 0)
  };
}

// ============================================================
// tournee.js — Logique métier tournée calendriers
// Amicale SP Pacy-sur-Eure — Tournée Calendriers
// ============================================================


// ── Statuts de passage foyer ──────────────────────────────────
const STATUT_PASSAGE = {
  DON:     "don",      // Don remis (espèces ou chèque)
  REFUSE:  "refuse",   // Présent mais refuse
  ABSENT:  "absent",   // Absent, à relancer éventuellement
  RELANCE: "relance"   // Absent, marqué à relancer
};

const STATUT_PASSAGE_LABEL = {
  don:     "Don collecté",
  refuse:  "A refusé",
  absent:  "Absent",
  relance: "À relancer"
};

const MODE_PAIEMENT = {
  ESPECES: "especes",
  CHEQUE:  "cheque",
  CARTE:   "carte"
};

// ════════════════════════════════════════════════════════════
//  ÉQUIPES
// ════════════════════════════════════════════════════════════

async function creerEquipe({ nom, membres = [], pin }) {
  if (!nom)      throw new Error("Nom d'équipe obligatoire");
  if (!pin || !/^\d{4}$/.test(pin)) throw new Error("PIN doit être 4 chiffres");

  // Vérifier unicité du PIN
  const existants = await fsQuery(COLLECTIONS.EQUIPES, where("pin", "==", pin));
  if (existants.length > 0) throw new Error("Ce PIN est déjà utilisé par une autre équipe");

  return fsAdd(COLLECTIONS.EQUIPES, { nom, membres, pin, actif: true });
}

async function mettreAJourEquipe(equipeId, data) {
  if (data.pin && !/^\d{4}$/.test(data.pin)) throw new Error("PIN doit être 4 chiffres");
  if (data.pin) {
    const existants = await fsQuery(COLLECTIONS.EQUIPES, where("pin", "==", data.pin));
    if (existants.some(e => e.id !== equipeId)) throw new Error("Ce PIN est déjà utilisé");
  }
  return fsUpdate(COLLECTIONS.EQUIPES, equipeId, data);
}

async function supprimerEquipe(equipeId) {
  return fsDelete(COLLECTIONS.EQUIPES, equipeId);
}

async function lireEquipes() {
  return fsGetAll(COLLECTIONS.EQUIPES);
}

async function lireEquipe(equipeId) {
  return fsGet(COLLECTIONS.EQUIPES, equipeId);
}

function ecouterEquipes(callback) {
  return fsListen(COLLECTIONS.EQUIPES, (equipes) => {
    equipes.sort((a, b) => a.nom.localeCompare(b.nom));
    callback(equipes);
  });
}

// ════════════════════════════════════════════════════════════
//  PASSAGES
// ════════════════════════════════════════════════════════════

async function ajouterPassage({
  secteurId, equipeId, equipeNom,
  adresse, statut, montant = 0,
  modePaiement = null, nomDonateur = "", note = ""
}) {
  if (!secteurId || !equipeId) throw new Error("secteurId et equipeId obligatoires");
  if (!Object.values(STATUT_PASSAGE).includes(statut)) throw new Error("Statut invalide");
  if (statut === STATUT_PASSAGE.DON && montant <= 0) throw new Error("Montant requis pour un don");

  const passage = await fsAdd(COLLECTIONS.PASSAGES, {
    secteurId,
    equipeId,
    equipeNom,
    adresse: adresse || "",
    statut,
    montant: statut === STATUT_PASSAGE.DON ? Number(montant) : 0,
    modePaiement: statut === STATUT_PASSAGE.DON ? modePaiement : null,
    nomDonateur,
    note,
    aRelancer: statut === STATUT_PASSAGE.ABSENT,
    datePassage: new Date().toISOString()
  });

  // Recalcul automatique des totaux du secteur
  await recalculerTotauxSecteur(secteurId);
  return passage;
}

async function modifierPassage(passageId, data) {
  await fsUpdate(COLLECTIONS.PASSAGES, passageId, data);
  if (data.secteurId) await recalculerTotauxSecteur(data.secteurId);
}

async function supprimerPassage(passageId, secteurId) {
  await fsDelete(COLLECTIONS.PASSAGES, passageId);
  await recalculerTotauxSecteur(secteurId);
}

// ── Marquer un absent comme "à relancer" ─────────────────────
async function marquerRelance(passageId, secteurId) {
  await fsUpdate(COLLECTIONS.PASSAGES, passageId, {
    aRelancer: true,
    statut: STATUT_PASSAGE.RELANCE
  });
  await recalculerTotauxSecteur(secteurId);
}

// ── Passages d'un secteur ─────────────────────────────────────
async function passagesDuSecteur(secteurId) {
  const passages = await fsQuery(COLLECTIONS.PASSAGES, where("secteurId", "==", secteurId));
  return passages.sort((a, b) => (a.datePassage || "").localeCompare(b.datePassage || ""));
}

// ── Passages d'une équipe ─────────────────────────────────────
async function passagesDeLEquipe(equipeId) {
  const passages = await fsQuery(COLLECTIONS.PASSAGES, where("equipeId", "==", equipeId));
  return passages.sort((a, b) => (a.datePassage || "").localeCompare(b.datePassage || ""));
}

// ── Foyers à relancer ─────────────────────────────────────────
async function foyersARelancer() {
  return fsQuery(COLLECTIONS.PASSAGES, where("aRelancer", "==", true));
}

// ── Écoute temps réel passages d'un secteur ──────────────────
function ecouterPassagesSecteur(secteurId, callback) {
  return fsListen(
    COLLECTIONS.PASSAGES,
    (passages) => {
      passages.sort((a, b) => (b.datePassage || "").localeCompare(a.datePassage || ""));
      callback(passages);
    },
    where("secteurId", "==", secteurId)
  );
}

// ════════════════════════════════════════════════════════════
//  STATISTIQUES
// ════════════════════════════════════════════════════════════

async function statsGlobalesTournee() {
  const [passages, equipes, secteurs] = await Promise.all([
    fsGetAll(COLLECTIONS.PASSAGES),
    fsGetAll(COLLECTIONS.EQUIPES),
    fsGetAll(COLLECTIONS.SECTEURS)
  ]);

  let totalEspeces = 0;
  let totalCheques = 0;
  let totalCarte   = 0;
  let nbDons       = 0;
  let nbRefus      = 0;
  let nbAbsents    = 0;
  let nbRelances   = 0;

  for (const p of passages) {
    if (p.statut === "don") {
      nbDons++;
      if (p.modePaiement === "especes") totalEspeces += Number(p.montant || 0);
      else if (p.modePaiement === "cheque") totalCheques += Number(p.montant || 0);
      else if (p.modePaiement === "carte") totalCarte += Number(p.montant || 0);
    }
    if (p.statut === "refuse")  nbRefus++;
    if (p.statut === "absent")  nbAbsents++;
    if (p.statut === "relance") nbRelances++;
  }

  const totalCollecte = totalEspeces + totalCheques + totalCarte;

  // Par équipe
  const parEquipe = equipes.map(eq => {
    const eqPassages = passages.filter(p => p.equipeId === eq.id);
    const montant = eqPassages
      .filter(p => p.statut === "don")
      .reduce((s, p) => s + Number(p.montant || 0), 0);
    return { ...eq, montant, nbPassages: eqPassages.length };
  }).sort((a, b) => b.montant - a.montant);

  const nbSecteursTermines = secteurs.filter(s => s.statut === "termine").length;
  const nbSecteursTotal    = secteurs.length;
  const avancement         = nbSecteursTotal > 0
    ? Math.round((nbSecteursTermines / nbSecteursTotal) * 100)
    : 0;

  return {
    totalCollecte, totalEspeces, totalCheques, totalCarte,
    nbDons, nbRefus, nbAbsents, nbRelances,
    nbPassages: passages.length,
    nbSecteursTermines, nbSecteursTotal, avancement,
    parEquipe
  };
}

// ════════════════════════════════════════════════════════════
//  CONFIG TOURNÉE
// ════════════════════════════════════════════════════════════

async function lireConfig() {
  return fsGet(COLLECTIONS.CONFIG, "tournee");
}

async function sauvegarderConfig(data) {
  return fsSet(COLLECTIONS.CONFIG, "tournee", data);
}

// ════════════════════════════════════════════════════════════
//  EXPORT BILAN CSV
// ════════════════════════════════════════════════════════════

async function exporterBilanCSV() {
  const [passages, secteurs, equipes] = await Promise.all([
    fsGetAll(COLLECTIONS.PASSAGES),
    fsGetAll(COLLECTIONS.SECTEURS),
    fsGetAll(COLLECTIONS.EQUIPES)
  ]);

  const secteurMap = Object.fromEntries(secteurs.map(s => [s.id, s]));
  const equipeMap  = Object.fromEntries(equipes.map(e => [e.id, e]));

  // Bilan par secteur
  let csv = "BILAN PAR SECTEUR\n";
  csv += "Secteur;Commune;Équipe;Statut;Total collecté (€);Foyers visités;Absents\n";
  for (const s of secteurs) {
    csv += `"${s.nom}";"${s.commune}";"${s.equipNom || '-'}";"${s.statut}";"${(s.totalCollecte || 0).toFixed(2)}";"${s.nbFoyersVisites || 0}";"${s.nbFoyersAbsents || 0}"\n`;
  }

  csv += "\n\nBILAN PAR ÉQUIPE\n";
  csv += "Équipe;Membres;Montant collecté (€);Nb passages\n";
  for (const e of equipes) {
    const eqPassages = passages.filter(p => p.equipeId === e.id);
    const montant    = eqPassages.filter(p => p.statut === "don").reduce((s, p) => s + Number(p.montant || 0), 0);
    csv += `"${e.nom}";"${(e.membres || []).join(', ')}";"${montant.toFixed(2)}";"${eqPassages.length}"\n`;
  }

  csv += "\n\nDÉTAIL DES PASSAGES\n";
  csv += "Date;Équipe;Secteur;Commune;Adresse;Statut;Mode paiement;Montant (€);Nom donateur;Note\n";
  const sorted = [...passages].sort((a, b) => (a.datePassage || "").localeCompare(b.datePassage || ""));
  for (const p of sorted) {
    const s = secteurMap[p.secteurId] || {};
    csv += `"${(p.datePassage || "").slice(0, 10)}";"${p.equipeNom || ''}";"${s.nom || ''}";"${s.commune || ''}";"${p.adresse || ''}";"${p.statut}";"${p.modePaiement || ''}";"${p.montant ? Number(p.montant).toFixed(2) : '0.00'}";"${p.nomDonateur || ''}";"${p.note || ''}"\n`;
  }

  csv += "\n\nFOYERS À RELANCER\n";
  csv += "Équipe;Secteur;Commune;Adresse;Note\n";
  for (const p of passages.filter(p => p.aRelancer)) {
    const s = secteurMap[p.secteurId] || {};
    csv += `"${p.equipeNom || ''}";"${s.nom || ''}";"${s.commune || ''}";"${p.adresse || ''}";"${p.note || ''}"\n`;
  }

  return csv;
}

// ── Télécharger le CSV ────────────────────────────────────────
function telechargerCSV(csv, filename = "bilan-tournee-calendriers.csv") {
  const bom = "\uFEFF"; // BOM UTF-8 pour Excel
  const blob = new Blob([bom + csv], { type: "text/csv;charset=utf-8;" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href     = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Cache des contours GeoJSON déjà récupérés (évite de re-fetch)
const _contourCache = {};

// Couleurs par statut de secteur
const COULEUR_STATUT = {
  libre:    "#9CA3AF",
  affecte:  "#3B82F6",
  en_cours: "#EAB308",
  termine:  "#22C55E"
};

// Palette de couleurs distinctes pour les équipes (cycle si >12 équipes)
const PALETTE_EQUIPES = [
  "#EF4444", "#F97316", "#EAB308", "#84CC16", "#22C55E",
  "#10B981", "#14B8A6", "#06B6D4", "#0EA5E9", "#3B82F6",
  "#6366F1", "#8B5CF6", "#A855F7", "#D946EF", "#EC4899",
  "#F43F5E", "#B91C1C", "#C2410C", "#A16207", "#4D7C0F",
  "#15803D", "#047857", "#0F766E", "#0E7490", "#0369A1",
  "#1D4ED8", "#4338CA", "#6D28D9", "#7E22CE", "#A21CAF",
  "#BE185D", "#9F1239", "#7C2D12", "#854D0E", "#3F6212",
  "#166534", "#065F46", "#155E75", "#1E3A8A", "#312E81"
];

// Attribue une couleur stable à chaque équipe (même équipe = même couleur toujours)
function getCouleurEquipe(equipeId, toutesLesEquipes) {
  if (!equipeId) return COULEUR_STATUT.libre;
  const ids = toutesLesEquipes.map(e => e.id).sort(); // ordre stable
  const idx = ids.indexOf(equipeId);
  if (idx === -1) return COULEUR_STATUT.libre;
  return PALETTE_EQUIPES[idx % PALETTE_EQUIPES.length];
}

// ── Charger dynamiquement Turf.js (calcul géométrique : enveloppe convexe) ──
let _turfLoading = null;
function chargerTurf() {
  if (window.turf) return Promise.resolve();
  if (_turfLoading) return _turfLoading;
  _turfLoading = new Promise((resolve, reject) => {
    const script = document.createElement("script");
    script.src = "https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js";
    script.onload = () => resolve();
    script.onerror = () => reject(new Error("Impossible de charger Turf.js"));
    document.head.appendChild(script);
  });
  return _turfLoading;
}

// Cache des géocodages de rues (évite de re-fetch la même rue)
const _geocodeCache = {};

// ── Géocoder une rue dans une commune via l'API Adresse BAN ──
async function geocoderRue(rue, commune) {
  const cacheKey = `${rue}|${commune}`;
  if (_geocodeCache[cacheKey] !== undefined) return _geocodeCache[cacheKey];
  try {
    const q = encodeURIComponent(`${rue} ${commune}`);
    const res = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${q}&limit=1`);
    if (!res.ok) { _geocodeCache[cacheKey] = null; return null; }
    const data = await res.json();
    const feature = data.features?.[0];
    const coords = feature ? feature.geometry.coordinates : null; // [lon, lat]
    _geocodeCache[cacheKey] = coords;
    return coords;
  } catch (e) {
    console.warn("Erreur géocodage", rue, commune, e);
    _geocodeCache[cacheKey] = null;
    return null;
  }
}

// ── Calculer un polygone approximatif (enveloppe convexe) à partir des rues d'un secteur ──
// Retourne un GeoJSON Polygon, ou null si pas assez de points pour former une zone
async function calculerZoneApproximative(rues, commune) {
  if (!rues || rues.length === 0) return null;
  await chargerTurf();

  const points = [];
  for (const rue of rues) {
    const coords = await geocoderRue(rue, commune);
    if (coords) points.push(coords);
  }

  if (points.length < 3) {
    // Pas assez de points pour un polygone : on fait un petit cercle autour du seul point dispo
    if (points.length > 0) {
      try {
        const circle = turf.circle(points[0], 0.3, { units: "kilometers", steps: 24 });
        return circle; // déjà un Feature complet
      } catch (e) { return null; }
    }
    return null;
  }

  try {
    const fc = turf.featureCollection(points.map(p => turf.point(p)));
    const hull = turf.convex(fc);
    if (!hull) return null;
    // Légère expansion (buffer) pour que la zone ne soit pas trop "collée" aux points
    return turf.buffer(hull, 0.15, { units: "kilometers" }) || hull; // Feature complet
  } catch (e) {
    console.warn("Erreur calcul enveloppe convexe", e);
    return null;
  }
}

// ── Récupérer le contour GeoJSON d'une commune via son code INSEE ──
async function fetchContourCommune(codeInsee) {
  if (_contourCache[codeInsee]) return _contourCache[codeInsee];
  try {
    const res = await fetch(`https://geo.api.gouv.fr/communes/${codeInsee}?format=geojson&geometry=contour`);
    if (!res.ok) return null;
    const geojson = await res.json();
    _contourCache[codeInsee] = geojson;
    return geojson;
  } catch (e) {
    console.warn("Erreur fetch contour", codeInsee, e);
    return null;
  }
}

// ── Charger dynamiquement Leaflet (CSS + JS) si pas déjà fait ──
let _leafletLoading = null;
function chargerLeaflet() {
  if (window.L) return Promise.resolve();
  if (_leafletLoading) return _leafletLoading;

  _leafletLoading = new Promise((resolve, reject) => {
    const css = document.createElement("link");
    css.rel = "stylesheet";
    css.href = "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css";
    document.head.appendChild(css);

    const script = document.createElement("script");
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js";
    script.onload = () => resolve();
    script.onerror = () => reject(new Error("Impossible de charger Leaflet"));
    document.head.appendChild(script);
  });
  return _leafletLoading;
}

// ── Initialiser une carte Leaflet dans un conteneur ──
async function initCarte(containerId, options = {}) {
  await chargerLeaflet();
  const map = L.map(containerId, {
    center: options.center || [49.029, 1.398], // Pacy-sur-Eure approx
    zoom: options.zoom || 11,
    scrollWheelZoom: options.scrollWheelZoom !== false
  });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19
  }).addTo(map);
  return map;
}

// ── Afficher tous les secteurs sur une carte, colorés par équipe affectée ──
async function afficherSecteursSurCarte(map, secteurs, equipes = []) {
  const layers = [];
  const bounds = [];

  for (const secteur of secteurs) {
    const codeInsee = COMMUNES_INSEE[secteur.commune];
    if (!codeInsee) continue;

    // Si le secteur a des rues précisées, on tente une zone approximative par géocodage
    // Sinon (ou en cas d'échec), on retombe sur le contour complet de la commune
    let geojson = null;
    if (secteur.rues && secteur.rues.length > 0) {
      geojson = await calculerZoneApproximative(secteur.rues, secteur.commune);
    }
    if (!geojson) {
      geojson = await fetchContourCommune(codeInsee);
    }
    if (!geojson) continue;

    // Couleur = couleur de l'équipe affectée (stable et unique par équipe), sinon gris "libre"
    const couleur = getCouleurEquipe(secteur.equipeId, equipes);

    const layer = L.geoJSON(geojson, {
      style: {
        color: "#FFFFFF",
        weight: 2,
        opacity: 0.9,
        fillColor: couleur,
        fillOpacity: secteur.statut === "termine" ? 0.65 : secteur.statut === "en_cours" ? 0.5 : secteur.equipeId ? 0.4 : 0.25
      }
    });

    const popupContent = `
      <div style="font-family:Inter,sans-serif;min-width:160px;">
        <strong style="font-size:13px;">${secteur.nom}</strong><br>
        <span style="font-size:12px;color:#666;">${secteur.commune}</span><br>
        <span style="font-size:12px;">👥 ${secteur.equipNom || 'Non affecté'}</span><br>
        <span style="font-size:12px;font-weight:700;color:#16A34A;">${Number(secteur.totalCollecte || 0).toLocaleString('fr-FR')} €</span>
      </div>
    `;
    layer.bindPopup(popupContent);
    layer.addTo(map);
    layers.push(layer);

    const b = layer.getBounds();
    if (b.isValid()) bounds.push(b);
  }

  if (bounds.length > 0) {
    let allBounds = bounds[0];
    bounds.forEach(b => { allBounds = allBounds.extend(b); });
    map.fitBounds(allBounds, { padding: [20, 20] });
  }

  return layers;
}

// ── Afficher un seul secteur (vue terrain équipier) ──
async function afficherSecteurUnique(map, secteur) {
  const codeInsee = COMMUNES_INSEE[secteur.commune];
  if (!codeInsee) return null;

  const geojson = await fetchContourCommune(codeInsee);
  if (!geojson) return null;

  const couleur = secteur.couleur || "#CC1D1D";
  const layer = L.geoJSON(geojson, {
    style: {
      color: couleur,
      weight: 3,
      fillColor: couleur,
      fillOpacity: 0.3
    }
  });
  layer.addTo(map);

  const bounds = layer.getBounds();
  if (bounds.isValid()) {
    map.fitBounds(bounds, { padding: [30, 30] });
  }

  return layer;
}

// ── Nettoyer une carte (avant de la recréer) ──
function detruireCarte(map) {
  if (map) {
    try { map.remove(); } catch(e) {}
  }
}

// ── Utilitaires DOM ───────────────────────────────────────────
const $  = (sel, ctx = document) => ctx.querySelector(sel);
const $$ = (sel, ctx = document) => [...ctx.querySelectorAll(sel)];
const show = (...els) => els.forEach(e => e && e.classList.remove("hidden"));
const hide = (...els) => els.forEach(e => e && e.classList.add("hidden"));

function toast(msg, type = "info") {
  const t = document.createElement("div");
  t.className = `toast toast--${type}`;
  t.textContent = msg;
  document.getElementById("toasts").appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function setLoading(btn, loading) {
  if (!btn) return;
  if (loading) { btn.dataset.orig = btn.textContent; btn.textContent = "…"; btn.disabled = true; }
  else { btn.textContent = btn.dataset.orig || btn.textContent; btn.disabled = false; }
}

function formatMontant(val) {
  return Number(val || 0).toLocaleString("fr-FR", { minimumFractionDigits: 2 }) + " €";
}

function stopUnsubs() {
  APP.unsubs.forEach(fn => fn && fn());
  APP.unsubs = [];
}

// ── Routing par hash ──────────────────────────────────────────
const ROUTES = {
  "#login":              renderLogin,
  "#dashboard":          renderDashboard,
  "#secteurs":           renderSecteurs,
  "#equipes":            renderEquipes,
  "#passages":           renderPassages,
  "#relances":           renderRelances,
  "#config":             renderConfig,
  "#terrain":            renderTerrain,
  "#terrain-passages":   renderTerrainPassages
};

function naviguer(hash) {
  window.location.hash = hash;
}

window.addEventListener("hashchange", () => {
  const hash = window.location.hash || "#login";
  const fn   = ROUTES[hash];
  if (fn) fn();
  else renderLogin();
});

// Gérer le retour de redirection Google Auth
getLoginRedirect().then(async (result) => {
  if (result?.user) {
    const admin = await isAdmin(result.user.email);
    if (!admin) {
      toast("Accès refusé : email non autorisé", "error");
      await logoutGoogle();
    }
    // onAuth prend le relais pour router
  }
}).catch((e) => {
  if (e?.code !== "auth/no-auth-event") {
    console.warn("Redirect result error:", e?.message);
  }
});

onAuth(async (user) => {
  console.log("onAuth fired, user:", user?.email || "null");

  // Vérifier session PIN équipier en premier (indépendant de Google Auth)
  const sessionEquipe = sessionStorage.getItem("equipe");
  if (sessionEquipe && !user) {
    const eq = JSON.parse(sessionEquipe);
    APP.role = "equipier";
    APP.user = eq;
    APP.equipeId  = eq.id;
    APP.equipeNom = eq.nom;
    naviguer("#terrain");
    return;
  }

  if (user) {
    console.log("Checking admin for:", user.email);
    try {
      const admin = await isAdmin(user.email);
      console.log("isAdmin result:", admin);
      if (admin) {
        APP.role = "admin";
        APP.user = user;
        const hash = window.location.hash;
        naviguer(ROUTES[hash] && hash !== "#login" ? hash : "#dashboard");
        return;
      }
      // Pas admin → toast + déconnexion
      toast("Accès refusé. Vérifie que ton email est dans la collection admins Firestore.", "error");
      console.error("Email non admin:", user.email);
      await logoutGoogle();
    } catch(e) {
      console.error("Erreur isAdmin:", e);
      toast("Erreur de vérification admin : " + e.message, "error");
      await logoutGoogle();
    }
  }

  naviguer("#login");
});

function bindLoginEvents() {
  // Tabs
  $$(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      $$(".tab-btn").forEach(b => b.classList.remove("tab-btn--active"));
      btn.classList.add("tab-btn--active");
      const tab = btn.dataset.tab;
      $$(".tab-panel").forEach(p => p.classList.add("hidden"));
      document.getElementById(`tab-${tab}`).classList.remove("hidden");
    });
  });

  // Google — signInWithPopup
  const btnGoogle = document.getElementById("btn-google");
  if (btnGoogle) {
    btnGoogle.addEventListener("click", async () => {
      setLoading(btnGoogle, true);
      try {
        const result = await loginGoogle();
        if (result?.user) {
          const admin = await isAdmin(result.user.email);
          if (admin) {
            APP.role = "admin";
            APP.user = result.user;
            naviguer("#dashboard");
          } else {
            toast("Accès refusé : " + result.user.email + " n\'est pas administrateur.", "error");
            await logoutGoogle();
            setLoading(btnGoogle, false);
          }
        }
      } catch (e) {
        if (e.code !== "auth/popup-closed-by-user") {
          toast("Erreur de connexion : " + e.message, "error");
        }
        setLoading(btnGoogle, false);
      }
    });
  }

  // PIN
  let pinSaisi = "";
  function updatePinDisplay() {
    const display = document.getElementById("pin-display");
    if (!display) return;
    display.textContent = pinSaisi.padEnd(4, "_");
  }

  $$(".pin-key").forEach(btn => {
    btn.addEventListener("click", async () => {
      const key = btn.dataset.key;
      if (key === "⌫") {
        pinSaisi = pinSaisi.slice(0, -1);
        updatePinDisplay();
        return;
      }
      if (key === "") return;
      if (pinSaisi.length >= 4) return;
      pinSaisi += key;
      updatePinDisplay();

      if (pinSaisi.length === 4) {
        const errEl = document.getElementById("pin-error");
        try {
          const equipe = await loginPin(pinSaisi);
          if (equipe) {
            APP.role = "equipier";
            APP.user = equipe;
            APP.equipeId  = equipe.id;
            APP.equipeNom = equipe.nom;
            sessionStorage.setItem("equipe", JSON.stringify(equipe));
            naviguer("#terrain");
          } else {
            errEl && errEl.classList.remove("hidden");
            pinSaisi = "";
            updatePinDisplay();
            setTimeout(() => errEl && errEl.classList.add("hidden"), 2500);
          }
        } catch(e) {
          toast("Erreur : " + e.message, "error");
          pinSaisi = "";
          updatePinDisplay();
        }
      }
    });
  });

function bindLogout() {
  document.getElementById("btn-logout")?.addEventListener("click", async () => {
    stopUnsubs();
    if (APP.role === "admin") await logoutGoogle();
    sessionStorage.removeItem("equipe");
    APP.role = null; APP.user = null; APP.equipeId = null; APP.equipeNom = null;
    naviguer("#login");
  });
}

// ════════════════════════════════════════════════════════════
//  DASHBOARD ADMIN
// ════════════════════════════════════════════════════════════

async function renderDashboard() {
  if (APP.role !== "admin") { naviguer("#login"); return; }
  stopUnsubs();

  document.getElementById("main").innerHTML = layoutAdmin("#dashboard", `
    <div class="page-header">
      <h1>Tableau de bord</h1>
      <button id="btn-export" class="btn btn--primary">⬇️ Exporter le bilan</button>
    </div>
    <div id="dashboard-content">
      <div class="loader">Chargement…</div>
    </div>
    <div class="section-block">
      <h2>Carte des secteurs</h2>
      <div id="dashboard-map" style="height:420px;border-radius:12px;overflow:hidden;"></div>
      <div id="map-legend" class="map-legend">
        <span><i style="background:#9CA3AF"></i> Non affecté</span>
      </div>
    </div>
  `);
  bindLogout();

  // Initialiser la carte
  let dashboardMap = null;
  initCarte("dashboard-map", { zoom: 11 }).then(map => { dashboardMap = map; refreshCarte(); });

  async function refreshCarte() {
    if (!dashboardMap) return;
    const [secteurs, equipes] = await Promise.all([lireSecteurs(), lireEquipes()]);
    // Nettoyer les anciennes couches
    dashboardMap.eachLayer(l => { if (l.options && l.options.attribution === undefined) dashboardMap.removeLayer(l); });
    // Recréer le fond de carte si besoin
    if (!dashboardMap._hasTileLayer) {
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap contributors', maxZoom: 19 }).addTo(dashboardMap);
      dashboardMap._hasTileLayer = true;
    }
    await afficherSecteursSurCarte(dashboardMap, secteurs, equipes);

    // Légende dynamique : une couleur par équipe
    const legend = document.getElementById("map-legend");
    if (legend) {
      legend.innerHTML = `<span><i style="background:#9CA3AF"></i> Non affecté</span>` +
        equipes.map((eq, i) => `<span><i style="background:${PALETTE_EQUIPES[equipes.map(e=>e.id).sort().indexOf(eq.id) % PALETTE_EQUIPES.length]}"></i> ${eq.nom}</span>`).join('');
    }
  }

  document.getElementById("btn-export")?.addEventListener("click", async () => {
    try {
      const csv = await exporterBilanCSV();
      const date = new Date().toISOString().slice(0,10);
      telechargerCSV(csv, `bilan-tournee-${date}.csv`);
      toast("Export téléchargé !", "success");
    } catch(e) { toast("Erreur export : " + e.message, "error"); }
  });

  async function refreshDashboard() {
    const stats = await statsGlobalesTournee();
    const content = document.getElementById("dashboard-content");
    if (!content) return;
    content.innerHTML = `
      <div class="stats-grid">
        <div class="stat-card stat-card--primary">
          <div class="stat-value">${formatMontant(stats.totalCollecte)}</div>
          <div class="stat-label">Total collecté</div>
          <div class="stat-sub">💵 ${formatMontant(stats.totalEspeces)} | 📝 ${formatMontant(stats.totalCheques)} | 💳 ${formatMontant(stats.totalCarte)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${stats.avancement}%</div>
          <div class="stat-label">Avancement</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${stats.avancement}%"></div></div>
          <div class="stat-sub">${stats.nbSecteursTermines} / ${stats.nbSecteursTotal} secteurs terminés</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${stats.nbDons}</div>
          <div class="stat-label">Dons reçus</div>
          <div class="stat-sub">🚫 ${stats.nbRefus} refus | 🔔 ${stats.nbRelances} à relancer</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${stats.nbPassages}</div>
          <div class="stat-label">Foyers visités</div>
          <div class="stat-sub">🔁 ${stats.nbAbsents} absents</div>
        </div>
      </div>

      <div class="section-block">

async function renderSecteurs() {
  if (APP.role !== "admin") { naviguer("#login"); return; }
  stopUnsubs();

  document.getElementById("main").innerHTML = layoutAdmin("#secteurs", `
    <div class="page-header">
      <h1>Secteurs géographiques</h1>
      <div style="display:flex; gap:8px;">
        <button id="btn-import-csv" class="btn btn--ghost">📥 Importer CSV</button>
        <button id="btn-add-secteur" class="btn btn--primary">+ Nouveau secteur</button>
      </div>
    </div>
    <div class="filter-bar">
      <input id="search-secteur" class="input input--sm" placeholder="🔍 Rechercher une commune ou un secteur…" style="max-width:320px;">
    </div>
    <div id="secteurs-list"><div class="loader">Chargement…</div></div>
    <div id="modal-secteur" class="modal hidden"></div>
    <input type="file" id="input-csv" accept=".csv" class="hidden">
  `);
  bindLogout();

  let _secteursCache = [];

  document.getElementById("search-secteur")?.addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    const filtered = q
      ? _secteursCache.filter(s =>
          s.commune.toLowerCase().includes(q) || s.nom.toLowerCase().includes(q))
      : _secteursCache;
    renderSecteursList(filtered);
  });

  document.getElementById("btn-add-secteur")?.addEventListener("click", () => showSecteurModal());

  document.getElementById("btn-import-csv")?.addEventListener("click", () => {
    document.getElementById("input-csv").click();
  });

  document.getElementById("input-csv")?.addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const text = await file.text();
    const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
    const headers = lines[0].split(',').map(h => h.trim());
    let created = 0, errors = 0;

    for (let i = 1; i < lines.length; i++) {
      // Parse CSV simple (gère les champs vides)
      const values = lines[i].split(',');
      const row = {};
      headers.forEach((h, idx) => row[h] = (values[idx] || '').trim());

      if (!row.nom || !row.commune) continue;

      try {
        await creerSecteur({
          nom: row.nom,
          commune: row.commune,
          description: row.description || '',
          rues: row.rues ? row.rues.split(';').map(r => r.trim()).filter(Boolean) : [],
          couleur: row.couleur || '#EF4444'
        });
        created++;
      } catch(err) {
        console.error('Erreur import ligne', i, err);
        errors++;
      }
    }
    toast(`Import terminé : ${created} secteur(s) créé(s)${errors ? `, ${errors} erreur(s)` : ''}`, errors ? "error" : "success");
    e.target.value = '';
  });

  const unsub = ecouterSecteurs((secteurs) => {
    _secteursCache = secteurs;
    const q = document.getElementById("search-secteur")?.value.trim().toLowerCase() || '';
    const filtered = q
      ? secteurs.filter(s => s.commune.toLowerCase().includes(q) || s.nom.toLowerCase().includes(q))
      : secteurs;
    renderSecteursList(filtered);
  });
  APP.unsubs.push(unsub);
}

function renderSecteursList(secteurs) {
  const list = document.getElementById("secteurs-list");

  if (secteurs.length === 0) {

async function renderEquipes() {

      </div>
    </div>
    <div id="equipes-list"><div class="loader">Chargement…</div></div>
    <div id="modal-equipe" class="modal hidden"></div>
    <input type="file" id="input-csv-equipe" accept=".csv" class="hidden">
  `);
  bindLogout();

  document.getElementById("btn-add-equipe")?.addEventListener("click", () => showEquipeModal());

  document.getElementById("btn-auto-affecter")?.addEventListener("click", async () => {
    if (!confirm("Affecter automatiquement chaque secteur à l'équipe portant son nom (ex: secteur \"Chambray\" → équipe \"Équipe Chambray\") ?\n\nLes secteurs déjà affectés à une autre équipe seront écrasés s'il y a correspondance.")) return;

    const btn = document.getElementById("btn-auto-affecter");
    setLoading(btn, true);
    try {
      const [equipes, secteurs] = await Promise.all([lireEquipes(), lireSecteurs()]);

      // Normalise un nom pour matcher : minuscules, sans accents, sans "équipe "
      const normalize = (s) => s
        .toLowerCase()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .replace(/^equipe\s+/i, "")
        .trim();

      const equipesParNom = {};
      equipes.forEach(eq => { equipesParNom[normalize(eq.nom)] = eq; });

      let affectes = 0, sansMatch = 0;
      for (const s of secteurs) {
        const match = equipesParNom[normalize(s.nom)];
        if (match) {
          await affecterEquipe(s.id, match.id, match.nom);
          affectes++;
        } else {
          sansMatch++;
        }
      }
      toast(`Affectation automatique : ${affectes} secteur(s) affecté(s)${sansMatch ? `, ${sansMatch} sans correspondance` : ''}`, "success");
    } catch(e) {
      toast("Erreur : " + e.message, "error");
    }
    setLoading(btn, false);
  });

  document.getElementById("btn-import-csv-equipe")?.addEventListener("click", () => {
    document.getElementById("input-csv-equipe").click();
  });

  document.getElementById("input-csv-equipe")?.addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const text = await file.text();
    const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
    const headers = lines[0].split(',').map(h => h.trim());
    let created = 0, errors = 0;

    for (let i = 1; i < lines.length; i++) {
      const values = lines[i].split(',');
      const row = {};
      headers.forEach((h, idx) => row[h] = (values[idx] || '').trim());

      if (!row.nom || !row.pin) continue;

      try {
        await creerEquipe({
          nom: row.nom,
          pin: row.pin,
          membres: row.membres ? row.membres.split(';').map(m => m.trim()).filter(Boolean) : []
        });
        created++;
      } catch(err) {
        console.error('Erreur import ligne', i, err);
        errors++;
      }
    }
    toast(`Import terminé : ${created} équipe(s) créée(s)${errors ? `, ${errors} erreur(s)` : ''}`, errors ? "error" : "success");
    e.target.value = '';
  });

  const unsub = ecouterEquipes(renderEquipesList);
  APP.unsubs.push(unsub);
}

    try {
      await sauvegarderConfig({
        annee:           Number(document.getElementById("cfg-annee").value),
        dateDebut:       document.getElementById("cfg-debut").value,
        dateFin:         document.getElementById("cfg-fin").value,
        objectif:        Number(document.getElementById("cfg-objectif").value),
        messageEquipiers: document.getElementById("cfg-message").value.trim(),
        admins
      });
      // Mettre à jour la collection admins
      for (const email of admins) {
        await fsSet("admins", email, { email, grantedAt: new Date().toISOString() });
      }
      toast("Configuration sauvegardée ✅", "success");
    } catch(e) { toast(e.message, "error"); }
  });
}

// ════════════════════════════════════════════════════════════
//  TERRAIN (vue équipier)
// ════════════════════════════════════════════════════════════

async function renderTerrain() {
  if (APP.role !== "equipier") { naviguer("#login"); return; }
  stopUnsubs();

  document.getElementById("main").innerHTML = `
    <div class="terrain-layout">
      <header class="terrain-header">
        <div class="terrain-brand">🚒 SP Pacy — Tournée Calendriers</div>
        <div class="terrain-equipe">👥 ${APP.equipeNom}</div>
        <button id="btn-logout-terrain" class="btn btn--ghost btn--sm">Quitter</button>
      </header>
      <div id="terrain-content">
        <div class="loader">Chargement de tes secteurs…</div>
      </div>
    </div>
  `;

  document.getElementById("btn-logout-terrain")?.addEventListener("click", () => {
    sessionStorage.removeItem("equipe");
    APP.role = null; APP.user = null; APP.equipeId = null; APP.equipeNom = null;
    naviguer("#login");
  });

  const unsub = ecouterSecteursEquipe(APP.equipeId, renderTerrainSecteurs);
  APP.unsubs.push(unsub);
}

function renderTerrainSecteurs(secteurs) {
  const content = document.getElementById("terrain-content");
  if (!content) return;
  if (secteurs.length === 0) {
    content.innerHTML = `<p class="empty-state terrain-empty">Aucun secteur assigné à ton équipe pour le moment.<br>Le chef d'amicale t'en attribuera prochainement.</p>`;
    return;
  }
  content.innerHTML = `
    <div class="terrain-secteurs">
      ${secteurs.map(s => `
        <div class="terrain-secteur-card" onclick="naviguerTerrain('${s.id}')">
          <div class="terrain-secteur-header">
            <span class="terrain-secteur-dot" style="background:${s.couleur || '#EF4444'}"></span>
            <div>
              <div class="terrain-secteur-nom">${s.nom}</div>
              <div class="terrain-secteur-commune">${s.commune}</div>
            </div>
            <span class="badge badge--${s.statut}">${STATUT_LABEL[s.statut]}</span>
          </div>
          <div class="terrain-secteur-stats">
            <span>💰 ${formatMontant(s.totalCollecte)}</span>
            <span>✅ ${s.nbFoyersVisites || 0} visités</span>
            <span>🔔 ${s.nbFoyersAbsents || 0} absents</span>
          </div>
          ${s.rues?.length ? `<div class="terrain-secteur-rues">${s.rues.join(' · ')}</div>` : ''}
        </div>
      `).join('')}
    </div>
  `;
}

window.naviguerTerrain = (secteurId) => {
  sessionStorage.setItem("secteurActif", secteurId);
  naviguer("#terrain-passages");
};

// ════════════════════════════════════════════════════════════
//  TERRAIN — SAISIE PASSAGES
// ════════════════════════════════════════════════════════════

async function renderTerrainPassages() {
  if (APP.role !== "equipier") { naviguer("#login"); return; }
  stopUnsubs();

  const secteurId = sessionStorage.getItem("secteurActif");
  if (!secteurId) { naviguer("#terrain"); return; }

  const secteur = await lireSecteur(secteurId);
  if (!secteur) { naviguer("#terrain"); return; }

  document.getElementById("main").innerHTML = `
    <div class="terrain-layout">
      <header class="terrain-header">
        <button class="btn btn--ghost btn--sm" onclick="naviguer('#terrain')">← Retour</button>
        <div class="terrain-header-title">
          <div class="terrain-secteur-titre">${secteur.nom}</div>
          <div class="terrain-secteur-commune">${secteur.commune}</div>
        </div>
        <span class="badge badge--${secteur.statut}">${STATUT_LABEL[secteur.statut]}</span>
      </header>

      <!-- Mini carte du secteur -->
      <div id="terrain-secteur-map" style="height:200px;margin:0 16px 16px;border-radius:12px;overflow:hidden;border:1.5px solid var(--gris-bord);"></div>

      <!-- Formulaire passage rapide -->
      <div class="passage-form">
        <input id="p-adresse" class="input" placeholder="Adresse / numéro (optionnel)" autocomplete="off">
        <div class="passage-statuts">
          <button class="statut-btn statut-btn--don"   data-statut="don"    onclick="selectStatut('don')">💰 Don</button>
          <button class="statut-btn statut-btn--refuse" data-statut="refuse" onclick="selectStatut('refuse')">🚫 Refus</button>
          <button class="statut-btn statut-btn--absent" data-statut="absent" onclick="selectStatut('absent')">🔔 Absent</button>
        </div>

        <div id="don-details" class="don-details hidden">
          <input id="p-montant" class="input input--montant" type="number" inputmode="decimal"
                 min="0" step="0.50" placeholder="Montant (€)">
          <div class="mode-paiement">
            <button class="mode-btn mode-btn--active" data-mode="especes" onclick="selectMode('especes')">💵 Espèces</button>
            <button class="mode-btn" data-mode="cheque" onclick="selectMode('cheque')">📝 Chèque</button>
            <button class="mode-btn" data-mode="carte" onclick="selectMode('carte')">💳 Carte</button>
          </div>
          <input id="p-donateur" class="input" placeholder="Nom donateur (optionnel)">
        </div>

        <div id="absent-details" class="absent-details hidden">
          <label class="checkbox-label">
            <input type="checkbox" id="p-relance"> À relancer
          </label>
        </div>

        <input id="p-note" class="input" placeholder="Note (optionnel)">
        <button id="btn-saisir" class="btn btn--primary btn--full" disabled>Enregistrer le passage</button>
      </div>

      <!-- Liste des passages du secteur -->
      <div class="passages-terrain">
        <h3>Passages enregistrés</h3>
        <div id="passages-terrain-list"><div class="loader">…</div></div>
      </div>
    </div>
  `;

  // Mini carte du secteur
  initCarte("terrain-secteur-map", { zoom: 13, scrollWheelZoom: false }).then(map => {
    afficherSecteurUnique(map, secteur);
  });

  let statutSelectionne = null;
  let modeSelectionne   = "especes";

  window.selectStatut = (statut) => {
    statutSelectionne = statut;
    $$(".statut-btn").forEach(b => b.classList.toggle("statut-btn--selected", b.dataset.statut === statut));
    const donDetails    = document.getElementById("don-details");
    const absentDetails = document.getElementById("absent-details");
    donDetails && (statut === "don" ? donDetails.classList.remove("hidden") : donDetails.classList.add("hidden"));
    absentDetails && (statut === "absent" ? absentDetails.classList.remove("hidden") : absentDetails.classList.add("hidden"));
    document.getElementById("btn-saisir").disabled = false;
  };

  window.selectMode = (mode) => {
    modeSelectionne = mode;
    $$(".mode-btn").forEach(b => b.classList.toggle("mode-btn--active", b.dataset.mode === mode));
  };

  document.getElementById("btn-saisir")?.addEventListener("click", async () => {
    if (!statutSelectionne) return;
    const adresse   = document.getElementById("p-adresse")?.value.trim();
    const note      = document.getElementById("p-note")?.value.trim();
    const montant   = parseFloat(document.getElementById("p-montant")?.value || "0");
    const donateur  = document.getElementById("p-donateur")?.value.trim();
    const aRelancer = document.getElementById("p-relance")?.checked;

    if (statutSelectionne === "don" && (!montant || montant <= 0)) {
      toast("Saisis le montant du don", "error"); return;
    }

    const btn = document.getElementById("btn-saisir");
    setLoading(btn, true);
    try {
      await ajouterPassage({
        secteurId,
        equipeId:  APP.equipeId,
        equipeNom: APP.equipeNom,
        adresse,
        statut: aRelancer ? STATUT_PASSAGE.RELANCE : statutSelectionne,
        montant,
        modePaiement: statutSelectionne === "don" ? modeSelectionne : null,
        nomDonateur: donateur,
        note
      });

      // Reset form
      document.getElementById("p-adresse").value  = "";
      document.getElementById("p-montant") && (document.getElementById("p-montant").value = "");
      document.getElementById("p-donateur") && (document.getElementById("p-donateur").value = "");
      document.getElementById("p-note").value = "";
      document.getElementById("p-relance") && (document.getElementById("p-relance").checked = false);
      statutSelectionne = null;
      $$(".statut-btn").forEach(b => b.classList.remove("statut-btn--selected"));
      document.getElementById("don-details")?.classList.add("hidden");
      document.getElementById("absent-details")?.classList.add("hidden");
      btn.disabled = true;
      toast("Passage enregistré ✅", "success");
    } catch(e) { toast(e.message, "error"); }
    setLoading(btn, false);
  });

  // Écoute temps réel
  const unsub = ecouterPassagesSecteur(secteurId, (passages) => {
    const list = document.getElementById("passages-terrain-list");
    if (!list) return;
    if (passages.length === 0) { list.innerHTML = `<p class="empty-state">Aucun passage encore.</p>`; return; }
    list.innerHTML = passages.map(p => `
      <div class="passage-item passage-item--${p.statut}">
        <span class="passage-statut-dot"></span>
        <div class="passage-info">
          <span class="passage-adresse">${p.adresse || '(adresse non précisée)'}</span>
          <span class="passage-badge">${STATUT_PASSAGE_LABEL[p.statut] || p.statut}</span>
          ${p.statut === 'don' ? `<span class="passage-montant">${formatMontant(p.montant)} ${p.modePaiement === 'cheque' ? '📝' : p.modePaiement === 'carte' ? '💳' : '💵'}</span>` : ''}
        </div>
        <span class="passage-heure">${(p.datePassage || '').slice(11,16)}</span>
      </div>
    `).join('');
  });
  APP.unsubs.push(unsub);
}

// Exposer naviguer globalement pour les onclick inline
window.naviguer = naviguer;

  </script>
