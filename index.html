<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#CC1D1D">
  <meta name="description" content="Gestion de la tournée de vente de calendriers — Amicale SP Pacy-sur-Eure, SDIS 27">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Calendriers SP">

  <title>Tournée Calendriers — SP Pacy</title>

  <!-- Favicon / Apple icons -->

  <!-- PWA Manifest -->
  <link rel="manifest" href="./manifest.json">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <!-- Zone principale de rendu (routing par hash) -->
  <div id="main"></div>

  <!-- Zone de toasts / notifications -->
  <div id="toasts" aria-live="polite"></div>

  <!-- ── Bootstrap de l'application ── -->
  <!--
    L'app utilise les modules ES natifs (type="module").
    Firebase SDK est importé depuis gstatic via ESM.
    app.js est le point d'entrée unique.
  -->
  <script type="module" src="./js/app.js"></script>

  <!-- ── Service Worker (PWA) ── -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW enregistré :', reg.scope))
          .catch(err => console.warn('SW non enregistré :', err));
      });
    }
  </script>

</body>
</html>
